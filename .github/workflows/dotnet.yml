name: Build MaxiGen GUI

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore
      run: nuget restore MaxiGen.csproj -PackagesDirectory packages

    - name: Build
      run: msbuild MaxiGen.csproj /p:Configuration=Release /p:OutputPath=./publish/

    - name: Upload App
      uses: actions/upload-artifact@v4
      with:
        name: MaxiGen-Portable
        path: ./publish/
