name: Build MaxiGen

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet Packages
      # Ponieważ plik jest w głównym folderze, podajemy tylko nazwę
      run: nuget restore MaxiGen.csproj -PackagesDirectory packages

    - name: Build Project
      run: msbuild MaxiGen.csproj /p:Configuration=Release /p:OutputPath=./publish/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MaxiGen-App
        path: ./publish/
