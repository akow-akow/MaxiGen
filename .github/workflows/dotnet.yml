name: Build MaxiGen

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Find and Restore
      shell: pwsh
      run: |
        # Szukamy pliku csproj w całym repozytorium
        $proj = Get-ChildItem -Recurse -Filter "*.csproj" | Select-Object -First 1
        if ($null -eq $proj) { throw "Nie znaleziono pliku .csproj w repozytorium!" }
        Write-Host "Znaleziono projekt: $($proj.FullName)"
        nuget restore $($proj.FullName) -PackagesDirectory packages

    - name: Build Project
      shell: pwsh
      run: |
        $proj = Get-ChildItem -Recurse -Filter "*.csproj" | Select-Object -First 1
        # Kompilujemy do folderu publish
        msbuild $($proj.FullName) /p:Configuration=Release /p:OutputPath=$env:GITHUB_WORKSPACE\publish\

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MaxiGen-App
        path: publish/
