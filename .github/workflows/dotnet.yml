name: .NET Framework Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest  # Niezbędne dla .NET Framework 4.8

steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2 # Aktualizacja do v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      # Szukamy bezpośrednio pliku projektu zamiast .sln
      run: nuget restore MaxiGen.Console/MaxiGen.Console.csproj -PackagesDirectory packages

    - name: Build
      # Kompilujemy bezpośrednio projekt
      run: msbuild MaxiGen.Console/MaxiGen.Console.csproj /p:Configuration=Release /p:OutDir=../publish/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MaxiGen-Net48-Binary
        path: ./MaxiGen.Console/bin/Release/
